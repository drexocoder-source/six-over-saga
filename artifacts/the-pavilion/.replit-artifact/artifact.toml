kind = "web"
previewPath = "/"
title = "The Pavilion"
version = "1.0.0"
id = "artifacts/the-pavilion"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18087

[services.development]
run = "pnpm --filter @workspace/the-pavilion run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/the-pavilion", "run", "build" ]
publicDir = "artifacts/the-pavilion/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18087"
BASE_PATH = "/"
